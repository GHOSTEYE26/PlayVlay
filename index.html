<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Melon Guardian</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: none;
    user-select: none;
}

body {
    overflow: hidden;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    min-height: 100svh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100dvh;
    min-height: 100svh;
    max-width: 500px;
    overflow: hidden;
    background: #1a2f1a;
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    left: 0;
    top: 0;
    z-index: 1;
    opacity: 0.85;
}

#lane-container {
    position: absolute;
    inset: 0;
    display: flex;
    z-index: 25;
}

.lane-trigger {
    flex: 1;
    height: 100%;
}

#hud {
    position: absolute;
    top: max(16px, env(safe-area-inset-top) + 8px);
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 25px;
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    z-index: 100;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

#lives { color: #ff4d4d; transition: transform 0.15s ease-out; }
#lives.hit-flash { transform: scale(1.3); }

#score { transition: transform 0.1s ease-out; }
#score.pop { transform: scale(1.25); color: #ffe066; }

/* Sound toggle */
#sound-toggle {
    position: absolute;
    top: max(16px, env(safe-area-inset-top) + 8px);
    right: 20px;
    z-index: 110;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* Combo banner */
#combo-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) scale(0.6);
    z-index: 105;
    font-weight: 900;
    letter-spacing: 1px;
    color: #ffd166;
    text-shadow: 0 0 10px rgba(255,209,102,0.9), 0 2px 4px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.15s ease-out, transform 0.15s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
}
#combo-display.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}
#combo-display.pulse {
    animation: comboPulse 0.25s ease-out;
}

@keyframes comboPulse {
    0% { transform: translateX(-50%) scale(1.4); }
    100% { transform: translateX(-50%) scale(1); }
}

/* Cannons */
.cannon {
    position: absolute;
    bottom: max(8px, env(safe-area-inset-bottom) + 6px);
    width: min(70px, 16vw);
    height: auto;
    transform: translateX(-50%);
    transform-origin: center bottom;
    z-index: 40;
    pointer-events: none;
    transition: transform 0.05s ease-out;
}

/* Objects Layer */
#objects {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
}

.sword, .watermelon {
    position: absolute;
}

/* Boss Health System CSS Elements */
.boss-hp-container {
    position: absolute;
    width: 60px;
    height: 6px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 3px;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
}
.boss-hp-bar {
    width: 100%;
    height: 100%;
    background: #ef4444;
    border-radius: 2px;
    transition: width 0.1s ease-out;
}

/* Missing asset styling blocks */
.fallback-sword {
    width: 16px;
    height: 50px;
    border-radius: 4px;
    box-shadow: 0 0 10px var(--glow);
}
.fallback-melon {
    border-radius: 50%;
    box-shadow: inset -5px -5px 0px rgba(0,0,0,0.3);
}

.fire, .smoke {
    position: absolute;
    pointer-events: none;
}

.juice-particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFade 0.5s ease-out forwards;
}

.juice-burst {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(239,68,68,0.85) 0%, rgba(239,68,68,0.55) 35%, rgba(239,68,68,0) 70%);
    animation: burstFade 0.4s ease-out forwards;
}

.floating-text {
    position: absolute;
    font-weight: 800;
    z-index: 60;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    animation: floatUp 0.8s ease-out forwards;
    white-space: nowrap;
}

.level-banner {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    z-index: 150;
    font-size: 38px;
    font-weight: 900;
    text-align: center;
    pointer-events: none;
    animation: levelBanner 1.3s cubic-bezier(.17,.89,.32,1.2) forwards;
}

.flash-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    z-index: 90;
    pointer-events: none;
    animation: flashFade 0.18s ease-out forwards;
}

.screen {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 200;
}

.screen h1 { font-size: 42px; margin-bottom: 10px; color: #ef4444; }
.btn {
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: #22c55e;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 15px;
}

.btn:active { transform: scale(0.95); }
.hidden { display: none !important; }

#game.shake-small { animation: shakeSmall 0.18s ease-out; }
#game.shake-big { animation: shakeBig 0.32s ease-out; }

@keyframes shakeSmall {
    0% { transform: translate(0,0); }
    25% { transform: translate(3px,-2px); }
    50% { transform: translate(-3px,2px); }
    75% { transform: translate(2px,1px); }
    100% { transform: translate(0,0); }
}

@keyframes shakeBig {
    0% { transform: translate(0,0) rotate(0deg); }
    15% { transform: translate(-8px,5px) rotate(-1deg); }
    30% { transform: translate(7px,-6px) rotate(1deg); }
    45% { transform: translate(-6px,4px) rotate(-1deg); }
    60% { transform: translate(6px,-3px) rotate(0.5deg); }
    75% { transform: translate(-4px,2px) rotate(-0.5deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

@keyframes fireFade {
    0% { opacity: 1; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.8); }
}

@keyframes smokeFade {
    0% { opacity: 0.7; transform: scale(0.6); }
    100% { opacity: 0; transform: translateY(-70px) scale(2); }
}

@keyframes particleFade {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--mx), var(--my)) scale(0.3) rotate(var(--rot)); }
}

@keyframes burstFade {
    0% { opacity: 0.9; transform: scale(0.2); }
    100% { opacity: 0; transform: scale(1.4); }
}

@keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.9); }
    20% { transform: translate(-50%, -8px) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
}

@keyframes levelBanner {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    30% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(0.9); }
}

@keyframes flashFade {
    0% { opacity: 0.55; }
    100% { opacity: 0; }
}

@media (max-width: 480px) {
    #hud {
        top: max(14px, env(safe-area-inset-top) + 8px);
        padding: 0 12px;
        font-size: 18px;
    }

    #sound-toggle {
        top: max(14px, env(safe-area-inset-top) + 8px);
        right: 12px;
        width: 40px;
        height: 40px;
        font-size: 16px;
    }

    .cannon {
        width: min(58px, 15vw);
        bottom: max(8px, env(safe-area-inset-bottom) + 6px);
    }

    #combo-display {
        top: 72px;
        font-size: 18px;
    }
}
</style>
</head>
<body>

<div id="game">
    <img src="images/Background.jpg" id="background" onerror="this.style.display='none'">

    <button id="sound-toggle" title="Toggle sound">🔊</button>

    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="lives">❤️❤️❤️</div>
        <div id="level">Lvl 1</div>
    </div>

    <div id="combo-display"></div>

    <div id="lane-container">
        <div class="lane-trigger" data-lane="0"></div>
        <div class="lane-trigger" data-lane="1"></div>
        <div class="lane-trigger" data-lane="2"></div>
        <div class="lane-trigger" data-lane="3"></div>
        <div class="lane-trigger" data-lane="4"></div>
    </div>

    <!-- Cannons -->
    <img src="images/Cannon.png" class="cannon" style="left:10%;" onerror="this.style.background='#374151'; this.style.borderRadius='8px 8px 0 0';">
    <img src="images/Cannon.png" class="cannon" style="left:30%;" onerror="this.style.background='#374151'; this.style.borderRadius='8px 8px 0 0';">
    <img src="images/Cannon.png" class="cannon" style="left:50%;" onerror="this.style.background='#374151'; this.style.borderRadius='8px 8px 0 0';">
    <img src="images/Cannon.png" class="cannon" style="left:70%;" onerror="this.style.background='#374151'; this.style.borderRadius='8px 8px 0 0';">
    <img src="images/Cannon.png" class="cannon" style="left:90%;" onerror="this.style.background='#374151'; this.style.borderRadius='8px 8px 0 0';">

    <div id="objects"></div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1>GAME OVER</h1>
        <p id="final-score">Your Score: 0</p>
        <p id="best-combo-line" style="opacity:0.8; margin-top:6px;"></p>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
/* ============================
   Audio Engine (procedural, no external files needed)
   ============================ */
const AudioEngine = (() => {
    let ctx = null;
    let master = null;
    let muted = false;

    function ensureCtx() {
        if (!ctx) {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            master = ctx.createGain();
            master.gain.value = muted ? 0 : 0.55;
            master.connect(ctx.destination);
        }
        if (ctx.state === "suspended") ctx.resume();
    }

    function tone({ freq = 440, endFreq = null, duration = 0.15, type = "sine", vol = 0.3, delay = 0 }) {
        ensureCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        const t0 = ctx.currentTime + delay;
        osc.frequency.setValueAtTime(freq, t0);
        if (endFreq !== null) {
            osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 1), t0 + duration);
        }
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(gain);
        gain.connect(master);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
    }

    function noiseBurst({ duration = 0.15, vol = 0.25, delay = 0, filterFreq = 1200 }) {
        ensureCtx();
        const bufferSize = ctx.sampleRate * duration;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = filterFreq;
        const gain = ctx.createGain();
        const t0 = ctx.currentTime + delay;
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(master);
        noise.start(t0);
        noise.stop(t0 + duration);
    }

    return {
        unlock() { ensureCtx(); },
        toggleMute() {
            muted = !muted;
            if (master) master.gain.value = muted ? 0 : 0.55;
            return muted;
        },
        isMuted() { return muted; },
        playShoot() {
            tone({ freq: 850, endFreq: 280, duration: 0.08, type: "sawtooth", vol: 0.11 });
        },
        playHit(combo) {
            const pitch = 260 + Math.min(combo, 12) * 28;
            noiseBurst({ duration: 0.12, vol: 0.2, filterFreq: 1900 });
            tone({ freq: pitch, endFreq: pitch * 1.5, duration: 0.09, type: "triangle", vol: 0.18 });
        },
        playBossHit() {
            noiseBurst({ duration: 0.18, vol: 0.35, filterFreq: 800 });
            tone({ freq: 180, endFreq: 90, duration: 0.15, type: "sawtooth", vol: 0.25 });
        },
        playComboMilestone() {
            tone({ freq: 660, duration: 0.09, type: "square", vol: 0.14 });
            tone({ freq: 880, duration: 0.12, type: "square", vol: 0.14, delay: 0.09 });
        },
        playMiss() {
            tone({ freq: 200, endFreq: 80, duration: 0.35, type: "sawtooth", vol: 0.24 });
        },
        playLevelUp() {
            tone({ freq: 523, duration: 0.12, type: "sine", vol: 0.22 });
            tone({ freq: 659, duration: 0.12, type: "sine", vol: 0.22, delay: 0.1 });
            tone({ freq: 784, duration: 0.22, type: "sine", vol: 0.24, delay: 0.2 });
        },
        playGameOver() {
            tone({ freq: 380, endFreq: 90, duration: 0.6, type: "sawtooth", vol: 0.22 });
        }
    };
})();

const soundToggleBtn = document.getElementById("sound-toggle");
soundToggleBtn.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    AudioEngine.unlock();
    const muted = AudioEngine.toggleMute();
    soundToggleBtn.textContent = muted ? "🔇" : "🔊";
});

/* ============================
   Upgrades & Game Logic Data
   ============================ */
const UpgradeSystem = {
    getSwordData(lvl) {
        // Upgrade Tier increments every 4 levels
        const tier = Math.floor((lvl - 1) / 4);
        switch(tier) {
            case 0:  return { name: "Iron Dagger", width: 40, height: 40, speed: 14, color: "#cbd5e1", glow: "rgba(255,255,255,0)" };
            case 1:  return { name: "Emerald Cleaver", width: 48, height: 52, speed: 16, color: "#10b981", glow: "rgba(16,185,129,0.4)" };
            case 2:  return { name: "Plasma Sabre", width: 52, height: 64, speed: 19, color: "#3b82f6", glow: "rgba(59,130,246,0.6)" };
            default: return { name: "Melon Buster X", width: 60, height: 75, speed: 22, color: "#a855f7", glow: "rgba(168,85,247,0.8)" };
        }
    }
};

const cannons = document.querySelectorAll(".cannon");
const objectLayer = document.getElementById("objects");
const laneContainer = document.getElementById("lane-container");
const gameOverScreen = document.getElementById("game-over-screen");
const gameEl = document.getElementById("game");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const levelEl = document.getElementById("level");
const comboEl = document.getElementById("combo-display");

const cannonPos = [10, 30, 50, 70, 90];
let score = 0, lives = 3, level = 1, isGameOver = false;
let activeSwords = [], activeMelons = [], spawnInterval;
let combo = 0, bestCombo = 0, comboResetTimer = null;
let bossActive = false;

// Controls
laneContainer.addEventListener("pointerdown", e => {
    AudioEngine.unlock();
    if (isGameOver) return;
    const lane = parseInt(e.target.dataset.lane);
    if (!isNaN(lane)) shootSword(lane);
});

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    if (e.key >= "1" && e.key <= "5") shootSword(parseInt(e.key) - 1);
});

function recoil(cannon) {
    cannon.style.transform = "translateX(-50%) translateY(12px) scaleY(0.8)";
    setTimeout(() => cannon.style.transform = "translateX(-50%)", 70);
}

function screenShake(size = "small") {
    gameEl.classList.remove("shake-small", "shake-big");
    void gameEl.offsetWidth;
    gameEl.classList.add(size === "big" ? "shake-big" : "shake-small");
}

function spawnFloatingText(x, y, text, color = "#fff", size = 22) {
    const el = document.createElement("div");
    el.className = "floating-text";
    el.textContent = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.color = color;
    el.style.fontSize = `${size}px`;
    objectLayer.appendChild(el);
    setTimeout(() => el.remove(), 820);
}

function spawnFire(xPct) {
    const fire = document.createElement("img");
    fire.src = "images/Fire.png";
    fire.onerror = () => fire.remove();
    fire.style.position = "absolute";
    fire.style.width = "45px";
    fire.style.left = `calc(${xPct}% - 22px)`;
    fire.style.bottom = "78px";
    fire.style.animation = "fireFade 0.3s linear forwards";
    objectLayer.appendChild(fire);
    setTimeout(() => fire.remove(), 350);
}

function spawnSmoke(xPct) {
    const smoke = document.createElement("img");
    smoke.src = "images/Smoke.png";
    smoke.onerror = () => smoke.remove();
    smoke.style.position = "absolute";
    smoke.style.width = "50px";
    smoke.style.left = `calc(${xPct}% - 25px)`;
    smoke.style.bottom = "75px";
    smoke.style.animation = "smokeFade 0.7s linear forwards";
    objectLayer.appendChild(smoke);
    setTimeout(() => smoke.remove(), 800);
}

function shootSword(cannonIndex) {
    const xPct = cannonPos[cannonIndex];
    const gameWidth = gameEl.clientWidth;
    const startX = (xPct / 100) * gameWidth;

    const swordData = UpgradeSystem.getSwordData(level);

    const sword = document.createElement("div");
    sword.className = "sword";
    sword.style.width = `${swordData.width}px`;
    sword.style.height = `${swordData.height}px`;
    sword.style.left = `${startX - (swordData.width / 2)}px`;
    sword.style.bottom = "85px";

    const img = document.createElement("img");
    img.src = "images/Sword.png";
    img.style.width = "100%";
    img.style.height = "100%";
    // Asset fallback layout
    img.onerror = () => {
        img.remove();
        sword.classList.add("fallback-sword");
        sword.style.background = swordData.color;
        sword.style.setProperty("--glow", swordData.glow);
    };
    sword.appendChild(img);
    objectLayer.appendChild(sword);

    const swordObj = { 
        element: sword, 
        x: startX, 
        y: 85, 
        speed: swordData.speed,
        width: swordData.width,
        height: swordData.height
    };
    activeSwords.push(swordObj);

    recoil(cannons[cannonIndex]);
    spawnFire(xPct);
    spawnSmoke(xPct);
    AudioEngine.playShoot();
}

function spawnWatermelon() {
    if (isGameOver || bossActive) return;

    // Trigger Boss sequence instead of regular wave if condition hit
    if (level % 5 === 0) {
        triggerBossMelon();
        return;
    }

    const melon = document.createElement("div");
    melon.className = "watermelon";
    melon.style.width = "58px";
    melon.style.height = "58px";

    const img = document.createElement("img");
    img.src = "images/Watermelon.png";
    img.style.width = "100%";
    img.style.height = "100%";
    img.onerror = () => {
        img.remove();
        melon.classList.add("fallback-melon");
        melon.style.background = "#22c55e";
        melon.style.border = "3px solid #16a34a";
    };
    melon.appendChild(img);

    const randomLane = Math.floor(Math.random() * 5);
    const gameWidth = gameEl.clientWidth;
    const targetX = (cannonPos[randomLane] / 100) * gameWidth;

    melon.style.left = `${targetX - 29}px`;
    melon.style.top = "-70px";
    objectLayer.appendChild(melon);

    activeMelons.push({
        element: melon,
        x: targetX,
        y: -70,
        width: 58,
        height: 58,
        speed: 2.6 + level * 0.65,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.08 + Math.random() * 0.05,
        spin: (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 0.8),
        isBoss: false
    });
}

function triggerBossMelon() {
    bossActive = true;
    clearInterval(spawnInterval);

    flashScreen();
    screenShake("big");

    const banner = document.createElement("div");
    banner.className = "level-banner";
    banner.style.color = "#ef4444";
    banner.innerHTML = `<span style="font-size:20px; color:#f97316;">WARNING</span><br>BOSS MELON!`;
    gameEl.appendChild(banner);
    setTimeout(() => banner.remove(), 1300);

    const bossSize = 110;
    const boss = document.createElement("div");
    boss.className = "watermelon";
    boss.style.width = `${bossSize}px`;
    boss.style.height = `${bossSize}px`;

    const img = document.createElement("img");
    img.src = "images/Watermelon.png"; // Scales up automatically
    img.style.width = "100%";
    img.style.height = "100%";
    img.onerror = () => {
        img.remove();
        boss.classList.add("fallback-melon");
        boss.style.background = "#dc2626";
        boss.style.border = "5px solid #991b1b";
    };
    boss.appendChild(img);

    // HP Bar Elements 
    const hpContainer = document.createElement("div");
    hpContainer.className = "boss-hp-container";
    const hpBar = document.createElement("div");
    hpBar.className = "boss-hp-bar";
    hpContainer.appendChild(hpBar);
    boss.appendChild(hpContainer);

    const gameWidth = gameEl.clientWidth;
    const targetX = gameWidth / 2; // Drops down the center lane

    boss.style.left = `${targetX - (bossSize / 2)}px`;
    boss.style.top = "-130px";
    objectLayer.appendChild(boss);

    const maxHp = 3 + Math.floor(level / 5) * 2;

    activeMelons.push({
        element: boss,
        hpBar: hpBar,
        x: targetX,
        y: -130,
        width: bossSize,
        height: bossSize,
        speed: 1.2 + (level * 0.15),
        wobble: 0,
        wobbleSpeed: 0.03,
        spin: 0.3,
        isBoss: true,
        hp: maxHp,
        maxHp: maxHp
    });
}

function createSplatter(x, y, multiplier = 1) {
    const burst = document.createElement("div");
    burst.className = "juice-burst";
    burst.style.transform = `scale(${multiplier})`;
    burst.style.left = `${x - 60}px`;
    burst.style.top = `${y - 60}px`;
    objectLayer.appendChild(burst);
    setTimeout(() => burst.remove(), 420);

    const juiceColors = ["#ef4444", "#dc2626", "#b91c1c", "#22c55e", "#ffe066"];
    const particleCount = 12 * multiplier;
    for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.className = "juice-particle";
        const size = (4 + Math.random() * 8) * multiplier;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.background = juiceColors[Math.floor(Math.random() * juiceColors.length)];
        p.style.left = `${x}px`;
        p.style.top = `${y}px`;
        const angle = Math.random() * Math.PI * 2;
        const dist = (50 + Math.random() * 100) * multiplier;
        p.style.setProperty('--mx', Math.cos(angle) * dist + "px");
        p.style.setProperty('--my', Math.sin(angle) * dist - 15 + "px");
        p.style.setProperty('--rot', (Math.random() * 360 - 180) + "deg");
        p.style.animationDuration = `${0.4 + Math.random() * 0.3}s`;
        objectLayer.appendChild(p);
        setTimeout(() => p.remove(), 750);
    }
}

function flashScreen() {
    const flash = document.createElement("div");
    flash.className = "flash-overlay";
    gameEl.appendChild(flash);
    setTimeout(() => flash.remove(), 200);
}

function showLevelBanner() {
    const banner = document.createElement("div");
    banner.className = "level-banner";
    banner.style.color = "#4ade80";
    
    // Check if sword upgraded this level
    const weaponName = UpgradeSystem.getSwordData(level).name;
    const isUpgradeLevel = (level - 1) % 4 === 0 && level > 1;

    banner.innerHTML = `LEVEL ${level}!<br>` + 
        (isUpgradeLevel ? `<span style="font-size:18px; color:#a855f7; text-shadow:0 0 8px #a855f7;">⚔️ UPGRADED: ${weaponName}!</span>` : "");
        
    gameEl.appendChild(banner);
    setTimeout(() => banner.remove(), 1350);
}

function updateComboDisplay() {
    if (combo >= 2) {
        comboEl.textContent = `🔥 COMBO x${combo}`;
        comboEl.classList.add("show");
        comboEl.classList.remove("pulse");
        void comboEl.offsetWidth;
        comboEl.classList.add("pulse");
    } else {
        comboEl.classList.remove("show");
    }
}

function registerHit(x, y, isBossDeath = false) {
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    clearTimeout(comboResetTimer);
    
    comboResetTimer = setTimeout(() => {
        combo = 0;
        updateComboDisplay();
    }, 1500);

    // Boss death yields high base scores
    const baseReward = isBossDeath ? 100 : 10;
    const bonus = baseReward + Math.min(combo - 1, 10) * 2;
    score += bonus;
    
    scoreEl.textContent = `Score: ${score}`;
    scoreEl.classList.remove("pop");
    void scoreEl.offsetWidth;
    scoreEl.classList.add("pop");

    const popColor = isBossDeath ? "#a855f7" : (combo >= 5 ? "#ffd166" : "#fff");
    spawnFloatingText(x, y - 25, `+${bonus}`, popColor, isBossDeath ? 32 : (combo >= 5 ? 26 : 20));

    updateComboDisplay();
    if (combo > 1 && combo % 5 === 0) {
        AudioEngine.playComboMilestone();
        spawnFloatingText(x, y - 50, "ON FIRE!", "#fb923c", 18);
    }
    
    screenShake(isBossDeath ? "big" : "small");
    checkLevelUp();
}

function checkLevelUp() {
    if (score >= level * 75) {
        level++;
        levelEl.textContent = `Lvl ${level}`;
        
        AudioEngine.playLevelUp();
        flashScreen();
        showLevelBanner();
        
        // Re-adjust parameters
        if (!bossActive) {
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnWatermelon, Math.max(450, 1300 - level * 90));
        }
    }
}

function updateLives() {
    lives--;
    livesEl.textContent = "❤️".repeat(Math.max(0, lives));
    livesEl.classList.remove("hit-flash");
    void livesEl.offsetWidth;
    livesEl.classList.add("hit-flash");

    combo = 0;
    clearTimeout(comboResetTimer);
    updateComboDisplay();

    AudioEngine.playMiss();
    screenShake("big");

    if (lives <= 0) endGame();
}

// Main Engine Frame Loop
function updateGame() {
    if (isGameOver) return;

    const gameHeight = window.innerHeight;

    // Process Projectile Swords
    for (let i = activeSwords.length - 1; i >= 0; i--) {
        const s = activeSwords[i];
        s.y += s.speed;
        s.element.style.bottom = `${s.y}px`;
        s.element.style.transform = `rotate(${s.y * 4}deg)`;

        if (s.y > gameHeight + 100) {
            s.element.remove();
            activeSwords.splice(i, 1);
        }
    }

    // Process Falling Targets + Collision Math
    for (let i = activeMelons.length - 1; i >= 0; i--) {
        const m = activeMelons[i];
        m.y += m.speed;
        m.wobble += m.wobbleSpeed;
        
        const sway = Math.sin(m.wobble) * (m.isBoss ? 8 : 4);
        const rotation = m.wobble * m.spin * 6;
        
        m.element.style.top = `${m.y}px`;
        m.element.style.transform = `translateX(${sway}px) rotate(${rotation}deg)`;

        // Check leak threshold boundary
        if (m.y > gameHeight - 120) {
            updateLives();
            if (m.isBoss) {
                bossActive = false;
                spawnInterval = setInterval(spawnWatermelon, Math.max(450, 1300 - level * 90));
            }
            m.element.remove();
            activeMelons.splice(i, 1);
            continue;
        }

        // Precise AABB/Bounding box intersections
        const melonRect = m.element.getBoundingClientRect();

        for (let j = activeSwords.length - 1; j >= 0; j--) {
            const s = activeSwords[j];
            const swordRect = s.element.getBoundingClientRect();

            if (!(swordRect.right < melonRect.left || 
                  swordRect.left > melonRect.right || 
                  swordRect.bottom < melonRect.top || 
                  swordRect.top > melonRect.bottom)) {
                
                const hitX = melonRect.left + (m.width / 2);
                const hitY = melonRect.top + (m.height / 2);

                // Destroy Sword ammo piece on impact
                s.element.remove();
                activeSwords.splice(j, 1);

                if (m.isBoss) {
                    m.hp--;
                    const hpPct = (m.hp / m.maxHp) * 100;
                    m.hpBar.style.width = `${hpPct}%`;
                    
                    createSplatter(hitX, hitY, 0.7);
                    AudioEngine.playBossHit();
                    screenShake("small");

                    if (m.hp <= 0) {
                        // Boss defeated successfully
                        createSplatter(hitX, hitY, 2.2);
                        m.element.remove();
                        activeMelons.splice(i, 1);
                        
                        bossActive = false;
                        registerHit(hitX, hitY, true);
                        
                        // Resume regular spawner loop
                        spawnInterval = setInterval(spawnWatermelon, Math.max(450, 1300 - level * 90));
                    }
                } else {
                    // Normal Melon collision behavior
                    createSplatter(hitX, hitY, 1);
                    m.element.remove();
                    activeMelons.splice(i, 1);
                    
                    registerHit(hitX, hitY, false);
                }
                break;
            }
        }
    }

    requestAnimationFrame(updateGame);
}

function endGame() {
    isGameOver = true;
    bossActive = false;
    clearInterval(spawnInterval);
    document.getElementById("final-score").textContent = `Your Score: ${score}`;
    document.getElementById("best-combo-line").textContent = bestCombo >= 2 ? `Best Combo: x${bestCombo}` : "";
    AudioEngine.playGameOver();
    gameOverScreen.classList.remove("hidden");
}

function resetGame() {
    activeSwords.forEach(s => s.element?.remove());
    activeMelons.forEach(m => m.element?.remove());
    activeSwords = [];
    activeMelons = [];

    score = 0; lives = 3; level = 1; isGameOver = false;
    combo = 0; bestCombo = 0; bossActive = false;
    clearTimeout(comboResetTimer);

    scoreEl.textContent = "Score: 0";   
    livesEl.textContent = "❤️❤️❤️";
    levelEl.textContent = "Lvl 1";
    updateComboDisplay();
    gameOverScreen.classList.add("hidden");

    clearInterval(spawnInterval);
    spawnInterval = setInterval(spawnWatermelon, 1200);
    updateGame();
}

// Initial Boot execution
resetGame();
</script>
