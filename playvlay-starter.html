<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="A PlayVlay starter game — tap to score." />
  <title>My PlayVlay Game</title>
  <style>
    html,body{margin:0;height:100%;background:#0b0b14;overflow:hidden;
      font-family:-apple-system,system-ui,sans-serif;color:#fff;-webkit-user-select:none;user-select:none}
    #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
    #score{font-size:64px;font-weight:800}
    #hint{margin-top:8px;opacity:.6;font-size:16px}
    #tap{position:fixed;inset:0}
  </style>
</head>
<body>
  <div id="wrap">
    <div id="score">0</div>
    <div id="hint">Tap anywhere to score</div>
  </div>
  <div id="tap"></div>

  <script>
    // ---- Your game state ----
    var score = 0, running = false, timeLeft = 30, timer = null;
    var scoreEl = document.getElementById('score');
    var hintEl = document.getElementById('hint');

    function start() {
      score = 0; timeLeft = 30; running = true;
      scoreEl.textContent = '0';
      hintEl.textContent = 'Tap! 30s';
      clearInterval(timer);
      timer = setInterval(function () {
        timeLeft--;
        hintEl.textContent = 'Tap! ' + timeLeft + 's';
        if (timeLeft <= 0) { end(); }
      }, 1000);
    }

    function end() {
      running = false;
      clearInterval(timer);
      hintEl.textContent = 'Game over — score ' + score;
      // REQUIRED: tell the app the run ended (records the high score).
      if (window.PlayVlay) PlayVlay.gameOver(score);
    }

    document.getElementById('tap').addEventListener('pointerdown', function () {
      if (!running) return;
      score++;
      scoreEl.textContent = String(score);
      // REQUIRED: report the score whenever it changes.
      if (window.PlayVlay) PlayVlay.reportScore(score);
    });

    // ---- PlayVlay contract ----
    // The SDK (window.PlayVlay) is provided automatically by the app. When testing
    // this file in a plain browser, PlayVlay is undefined, so we guard every call.
    if (window.PlayVlay) {
      PlayVlay.onStart(start);
      PlayVlay.onRestart(start);
      PlayVlay.onPause(function () { running = false; clearInterval(timer); });
      PlayVlay.onResume(function () { if (timeLeft > 0) start(); });
      PlayVlay.ready(); // REQUIRED — tells the app we're loaded and startable.
    } else {
      // Standalone fallback so the file is playable when opened directly.
      start();
    }
  </script>
</body>
</html>
