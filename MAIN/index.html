<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Melon Guardian</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: none;
    user-select: none;
}

body {
    overflow: hidden;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 500px;
    overflow: hidden;
    background: #1a2f1a;
}

#background {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    left: 0;
    top: 0;
    z-index: 1;
    opacity: 0.85;
}

#lane-container {
    position: absolute;
    inset: 0;
    display: flex;
    z-index: 50;
}

.lane-trigger {
    flex: 1;
    height: 100%;
}

#hud {
    position: absolute;
    top: 20px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 25px;
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    z-index: 100;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
}

#lives { color: #ff4d4d; transition: transform 0.15s ease-out; }
#lives.hit-flash { transform: scale(1.3); }

#score { transition: transform 0.1s ease-out; }
#score.pop { transform: scale(1.25); color: #ffe066; }

/* Sound toggle */
#sound-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 110;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
#hud { top: 65px; }

/* Combo banner */
#combo-display {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) scale(0.6);
    z-index: 105;
    font-weight: 900;
    letter-spacing: 1px;
    color: #ffd166;
    text-shadow: 0 0 10px rgba(255,209,102,0.9), 0 2px 4px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.15s ease-out, transform 0.15s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
}
#combo-display.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}
#combo-display.pulse {
    animation: comboPulse 0.25s ease-out;
}

@keyframes comboPulse {
    0% { transform: translateX(-50%) scale(1.4); }
    100% { transform: translateX(-50%) scale(1); }
}

/* Cannons */
.cannon {
    position: absolute;
    bottom: 15px;
    width: 70px;
    height: 85px;
    transform: translateX(-50%);
    transform-origin: center bottom;
    z-index: 20;
    transition: transform 0.05s ease-out;
}

/* Objects Layer */
#objects {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 10;
}

.sword, .watermelon {
    position: absolute;
}

.fire, .smoke {
    position: absolute;
    pointer-events: none;
}

.juice-particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFade 0.5s ease-out forwards;
}

.juice-burst {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(239,68,68,0.85) 0%, rgba(239,68,68,0.55) 35%, rgba(239,68,68,0) 70%);
    animation: burstFade 0.4s ease-out forwards;
}

.floating-text {
    position: absolute;
    font-weight: 800;
    z-index: 60;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    animation: floatUp 0.8s ease-out forwards;
    white-space: nowrap;
}

.level-banner {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    z-index: 150;
    font-size: 40px;
    font-weight: 900;
    color: #4ade80;
    text-shadow: 0 0 18px rgba(74,222,128,0.9), 0 3px 6px rgba(0,0,0,0.9);
    pointer-events: none;
    animation: levelBanner 1.1s ease-out forwards;
}

.flash-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    z-index: 90;
    pointer-events: none;
    animation: flashFade 0.18s ease-out forwards;
}

.screen {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    z-index: 200;
}

.screen h1 { font-size: 42px; margin-bottom: 10px; color: #ef4444; }
.btn {
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: #22c55e;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 15px;
}

.btn:active { transform: scale(0.95); }
.hidden { display: none !important; }

#game.shake-small { animation: shakeSmall 0.18s ease-out; }
#game.shake-big { animation: shakeBig 0.32s ease-out; }

@keyframes shakeSmall {
    0% { transform: translate(0,0); }
    25% { transform: translate(3px,-2px); }
    50% { transform: translate(-3px,2px); }
    75% { transform: translate(2px,1px); }
    100% { transform: translate(0,0); }
}

@keyframes shakeBig {
    0% { transform: translate(0,0) rotate(0deg); }
    15% { transform: translate(-8px,5px) rotate(-1deg); }
    30% { transform: translate(7px,-6px) rotate(1deg); }
    45% { transform: translate(-6px,4px) rotate(-1deg); }
    60% { transform: translate(6px,-3px) rotate(0.5deg); }
    75% { transform: translate(-4px,2px) rotate(-0.5deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

@keyframes fireFade {
    0% { opacity: 1; transform: scale(0.6); }
    100% { opacity: 0; transform: scale(1.8); }
}

@keyframes smokeFade {
    0% { opacity: 0.7; transform: scale(0.6); }
    100% { opacity: 0; transform: translateY(-70px) scale(2); }
}

@keyframes particleFade {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--mx), var(--my)) scale(0.3) rotate(var(--rot)); }
}

@keyframes burstFade {
    0% { opacity: 0.9; transform: scale(0.2); }
    100% { opacity: 0; transform: scale(1.4); }
}

@keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0) scale(0.9); }
    20% { transform: translate(-50%, -8px) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(1); }
}

@keyframes levelBanner {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    25% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
}

@keyframes flashFade {
    0% { opacity: 0.55; }
    100% { opacity: 0; }
}
</style>
</head>
<body>

<div id="game">
    <img src="images/Background.jpg" id="background">

    <button id="sound-toggle" title="Toggle sound">🔊</button>

    <div id="hud">
        <div id="score">Score: 0</div>
        <div id="lives">❤️❤️❤️</div>
        <div id="level">Lvl 1</div>
    </div>

    <div id="combo-display"></div>

    <div id="lane-container">
        <div class="lane-trigger" data-lane="0"></div>
        <div class="lane-trigger" data-lane="1"></div>
        <div class="lane-trigger" data-lane="2"></div>
        <div class="lane-trigger" data-lane="3"></div>
        <div class="lane-trigger" data-lane="4"></div>
    </div>

    <!-- Cannons -->
    <img src="images/Cannon.png" class="cannon" style="left:10%;">
    <img src="images/Cannon.png" class="cannon" style="left:30%;">
    <img src="images/Cannon.png" class="cannon" style="left:50%;">
    <img src="images/Cannon.png" class="cannon" style="left:70%;">
    <img src="images/Cannon.png" class="cannon" style="left:90%;">

    <div id="objects"></div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1>GAME OVER</h1>
        <p id="final-score">Your Score: 0</p>
        <p id="best-combo-line" style="opacity:0.8; margin-top:6px;"></p>
        <button class="btn" onclick="resetGame()">Play Again</button>
    </div>
</div>

<script>
/* ============================
   Audio Engine (procedural, no external files needed)
   ============================ */
const AudioEngine = (() => {
    let ctx = null;
    let master = null;
    let muted = false;

    function ensureCtx() {
        if (!ctx) {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            master = ctx.createGain();
            master.gain.value = muted ? 0 : 0.55;
            master.connect(ctx.destination);
        }
        if (ctx.state === "suspended") ctx.resume();
    }

    function tone({ freq = 440, endFreq = null, duration = 0.15, type = "sine", vol = 0.3, delay = 0 }) {
        ensureCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        const t0 = ctx.currentTime + delay;
        osc.frequency.setValueAtTime(freq, t0);
        if (endFreq !== null) {
            osc.frequency.exponentialRampToValueAtTime(Math.max(endFreq, 1), t0 + duration);
        }
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
        osc.connect(gain);
        gain.connect(master);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
    }

    function noiseBurst({ duration = 0.15, vol = 0.25, delay = 0, filterFreq = 1200 }) {
        ensureCtx();
        const bufferSize = ctx.sampleRate * duration;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        const filter = ctx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.value = filterFreq;
        const gain = ctx.createGain();
        const t0 = ctx.currentTime + delay;
        gain.gain.setValueAtTime(vol, t0);
        gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(master);
        noise.start(t0);
        noise.stop(t0 + duration);
    }

    return {
        unlock() { ensureCtx(); },
        toggleMute() {
            muted = !muted;
            if (master) master.gain.value = muted ? 0 : 0.55;
            return muted;
        },
        isMuted() { return muted; },
        playShoot() {
            tone({ freq: 900, endFreq: 320, duration: 0.09, type: "sawtooth", vol: 0.12 });
        },
        playHit(combo) {
            const pitch = 260 + Math.min(combo, 12) * 28;
            noiseBurst({ duration: 0.14, vol: 0.22, filterFreq: 1800 });
            tone({ freq: pitch, endFreq: pitch * 1.6, duration: 0.1, type: "triangle", vol: 0.18 });
        },
        playComboMilestone() {
            tone({ freq: 660, duration: 0.09, type: "square", vol: 0.16 });
            tone({ freq: 880, duration: 0.12, type: "square", vol: 0.16, delay: 0.09 });
            tone({ freq: 1100, duration: 0.16, type: "square", vol: 0.16, delay: 0.18 });
        },
        playMiss() {
            tone({ freq: 220, endFreq: 90, duration: 0.35, type: "sawtooth", vol: 0.22 });
        },
        playLevelUp() {
            tone({ freq: 523, duration: 0.12, type: "sine", vol: 0.22 });
            tone({ freq: 659, duration: 0.12, type: "sine", vol: 0.22, delay: 0.1 });
            tone({ freq: 784, duration: 0.22, type: "sine", vol: 0.24, delay: 0.2 });
        },
        playGameOver() {
            tone({ freq: 400, endFreq: 100, duration: 0.6, type: "sawtooth", vol: 0.22 });
            tone({ freq: 300, endFreq: 70, duration: 0.7, type: "sine", vol: 0.18, delay: 0.08 });
        }
    };
})();

const soundToggleBtn = document.getElementById("sound-toggle");
soundToggleBtn.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    AudioEngine.unlock();
    const muted = AudioEngine.toggleMute();
    soundToggleBtn.textContent = muted ? "🔇" : "🔊";
});

/* ============================
   Game
   ============================ */
const cannons = document.querySelectorAll(".cannon");
const objectLayer = document.getElementById("objects");
const laneContainer = document.getElementById("lane-container");
const gameOverScreen = document.getElementById("game-over-screen");
const gameEl = document.getElementById("game");
const scoreEl = document.getElementById("score");
const livesEl = document.getElementById("lives");
const levelEl = document.getElementById("level");
const comboEl = document.getElementById("combo-display");

const cannonPos = [10, 30, 50, 70, 90];
let score = 0, lives = 3, level = 1, isGameOver = false;
let activeSwords = [], activeMelons = [], spawnInterval;
let combo = 0, bestCombo = 0, comboResetTimer = null;

// Controls
laneContainer.addEventListener("pointerdown", e => {
    AudioEngine.unlock();
    if (isGameOver) return;
    const lane = parseInt(e.target.dataset.lane);
    if (!isNaN(lane)) shootSword(lane);
});

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    if (e.key >= "1" && e.key <= "5") shootSword(parseInt(e.key) - 1);
});

function recoil(cannon) {
    cannon.style.transform = "translateX(-50%) translateY(12px) scaleY(0.8)";
    setTimeout(() => cannon.style.transform = "translateX(-50%)", 70);
}

function screenShake(size = "small") {
    gameEl.classList.remove("shake-small", "shake-big");
    // force reflow so the animation can retrigger
    void gameEl.offsetWidth;
    gameEl.classList.add(size === "big" ? "shake-big" : "shake-small");
}

function spawnFloatingText(x, y, text, color = "#fff", size = 22) {
    const el = document.createElement("div");
    el.className = "floating-text";
    el.textContent = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    el.style.color = color;
    el.style.fontSize = `${size}px`;
    objectLayer.appendChild(el);
    setTimeout(() => el.remove(), 820);
}

function spawnFire(xPct) {
    const fire = document.createElement("img");
    fire.src = "images/Fire.png";
    fire.onerror = () => fire.style.display = "none";
    fire.style.position = "absolute";
    fire.style.width = "45px";
    fire.style.left = `calc(${xPct}% - 22px)`;
    fire.style.bottom = "78px";
    fire.style.animation = "fireFade 0.3s linear forwards";
    objectLayer.appendChild(fire);
    setTimeout(() => fire.remove(), 350);
}

function spawnSmoke(xPct) {
    const smoke = document.createElement("img");
    smoke.src = "images/Smoke.png";
    smoke.onerror = () => smoke.style.display = "none";
    smoke.style.position = "absolute";
    smoke.style.width = "50px";
    smoke.style.left = `calc(${xPct}% - 25px)`;
    smoke.style.bottom = "75px";
    smoke.style.animation = "smokeFade 0.7s linear forwards";
    objectLayer.appendChild(smoke);
    setTimeout(() => smoke.remove(), 800);
}

function shootSword(cannonIndex) {
    const xPct = cannonPos[cannonIndex];
    const gameWidth = document.getElementById("game").clientWidth;
    const startX = (xPct / 100) * gameWidth;

    const sword = document.createElement("img");
    sword.src = "images/Sword.png";
    sword.style.position = "absolute";
    sword.style.width = "48px";
    sword.style.left = `${startX - 24}px`;
    sword.style.bottom = "85px";
    objectLayer.appendChild(sword);

    const swordObj = { element: sword, x: startX, y: 85 };
    activeSwords.push(swordObj);

    recoil(cannons[cannonIndex]);
    spawnFire(xPct);
    spawnSmoke(xPct);
    AudioEngine.playShoot();
}

function spawnWatermelon() {
    if (isGameOver) return;

    const melon = document.createElement("img");
    melon.src = "images/Watermelon.png";
    melon.style.position = "absolute";
    melon.style.width = "58px";

    const randomLane = Math.floor(Math.random() * 5);
    const gameWidth = document.getElementById("game").clientWidth;
    const targetX = (cannonPos[randomLane] / 100) * gameWidth;

    melon.style.left = `${targetX - 29}px`;
    melon.style.top = "-70px";
    objectLayer.appendChild(melon);

    activeMelons.push({
        element: melon,
        x: targetX,
        y: -70,
        speed: 2.6 + level * 0.65,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.08 + Math.random() * 0.05,
        spin: (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 0.8)
    });
}

function createSplatter(x, y) {
    // Radial juice burst (always works, no image dependency)
    const burst = document.createElement("div");
    burst.className = "juice-burst";
    burst.style.left = `${x - 45}px`;
    burst.style.top = `${y - 45}px`;
    objectLayer.appendChild(burst);
    setTimeout(() => burst.remove(), 420);

    // Try using splash image if available, hide gracefully if missing
    const splash = document.createElement("img");
    splash.src = "images/Watermelon Splash.png";
    splash.onerror = () => splash.remove();
    splash.style.position = "absolute";
    splash.style.width = "80px";
    splash.style.left = `${x - 40}px`;
    splash.style.top = `${y - 40}px`;
    splash.style.opacity = "0.9";
    objectLayer.appendChild(splash);
    setTimeout(() => splash.remove(), 600);

    // Juicy particle spray - more particles, varied size/color
    const juiceColors = ["#ef4444", "#f87171", "#dc2626", "#22c55e", "#16a34a"];
    const particleCount = 12;
    for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.className = "juice-particle";
        const size = 5 + Math.random() * 10;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.background = juiceColors[Math.floor(Math.random() * juiceColors.length)];
        p.style.left = `${x + (Math.random() * 30 - 15)}px`;
        p.style.top = `${y + (Math.random() * 30 - 15)}px`;
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 110;
        p.style.setProperty('--mx', Math.cos(angle) * dist + "px");
        p.style.setProperty('--my', Math.sin(angle) * dist - 20 + "px");
        p.style.setProperty('--rot', (Math.random() * 360 - 180) + "deg");
        p.style.animationDuration = `${0.4 + Math.random() * 0.3}s`;
        objectLayer.appendChild(p);
        setTimeout(() => p.remove(), 750);
    }
}

function flashScreen() {
    const flash = document.createElement("div");
    flash.className = "flash-overlay";
    gameEl.appendChild(flash);
    setTimeout(() => flash.remove(), 200);
}

function showLevelBanner() {
    const banner = document.createElement("div");
    banner.className = "level-banner";
    banner.textContent = `LEVEL ${level}!`;
    gameEl.appendChild(banner);
    setTimeout(() => banner.remove(), 1150);
}

function updateComboDisplay() {
    if (combo >= 2) {
        comboEl.textContent = `🔥 COMBO x${combo}`;
        comboEl.classList.add("show");
        comboEl.classList.remove("pulse");
        void comboEl.offsetWidth;
        comboEl.classList.add("pulse");
    } else {
        comboEl.classList.remove("show");
    }
}

function registerHit(x, y) {
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    clearTimeout(comboResetTimer);
    comboResetTimer = setTimeout(() => {
        combo = 0;
        updateComboDisplay();
    }, 1400);

    const bonus = 10 + Math.min(combo - 1, 10) * 2;
    score += bonus;
    scoreEl.textContent = `Score: ${score}`;
    scoreEl.classList.remove("pop");
    void scoreEl.offsetWidth;
    scoreEl.classList.add("pop");

    const popColor = combo >= 5 ? "#ffd166" : "#fff";
    spawnFloatingText(x, y - 20, `+${bonus}`, popColor, combo >= 5 ? 26 : 20);

    updateComboDisplay();
    if (combo > 1 && combo % 5 === 0) {
        AudioEngine.playComboMilestone();
        spawnFloatingText(x, y - 45, "ON FIRE!", "#fb923c", 18);
        screenShake("small");
    } else {
        screenShake("small");
    }
    AudioEngine.playHit(combo);

    checkLevelUp();
}

function checkLevelUp() {
    if (score >= level * 60) {
        level++;
        levelEl.textContent = `Lvl ${level}`;
        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnWatermelon, Math.max(400, 1300 - level * 100));
        AudioEngine.playLevelUp();
        flashScreen();
        showLevelBanner();
    }
}

function updateLives() {
    lives--;
    livesEl.textContent = "❤️".repeat(Math.max(0, lives));
    livesEl.classList.remove("hit-flash");
    void livesEl.offsetWidth;
    livesEl.classList.add("hit-flash");

    combo = 0;
    clearTimeout(comboResetTimer);
    updateComboDisplay();

    AudioEngine.playMiss();
    screenShake("big");

    if (lives <= 0) endGame();
}

// Game Loop
function updateGame() {
    if (isGameOver) return;

    const gameHeight = window.innerHeight;

    // Swords
    for (let i = activeSwords.length - 1; i >= 0; i--) {
        const s = activeSwords[i];
        s.y += 14;
        s.element.style.bottom = `${s.y}px`;
        s.element.style.transform = `rotate(${s.y * 4}deg)`;

        if (s.y > gameHeight + 100) {
            s.element.remove();
            activeSwords.splice(i, 1);
        }
    }

    // Melons + Collision
    for (let i = activeMelons.length - 1; i >= 0; i--) {
        const m = activeMelons[i];
        m.y += m.speed;
        m.wobble += m.wobbleSpeed;
        const sway = Math.sin(m.wobble) * 4;
        const rotation = m.wobble * m.spin * 6;
        m.element.style.top = `${m.y}px`;
        m.element.style.transform = `translateX(${sway}px) rotate(${rotation}deg)`;

        if (m.y > gameHeight - 120) {
            updateLives();
            m.element.remove();
            activeMelons.splice(i, 1);
            continue;
        }

        const melonRect = m.element.getBoundingClientRect();

        for (let j = activeSwords.length - 1; j >= 0; j--) {
            const s = activeSwords[j];
            const swordRect = s.element.getBoundingClientRect();

            if (!(swordRect.right < melonRect.left || 
                  swordRect.left > melonRect.right || 
                  swordRect.bottom < melonRect.top || 
                  swordRect.top > melonRect.bottom)) {
                
                const hitX = melonRect.left + 25;
                const hitY = melonRect.top + 25;
                createSplatter(hitX, hitY);
                
                m.element.remove();
                activeMelons.splice(i, 1);
                s.element.remove();
                activeSwords.splice(j, 1);

                registerHit(hitX, hitY);
                break;
            }
        }
    }

    requestAnimationFrame(updateGame);
}

function endGame() {
    isGameOver = true;
    clearInterval(spawnInterval);
    document.getElementById("final-score").textContent = `Your Score: ${score}`;
    document.getElementById("best-combo-line").textContent = bestCombo >= 2 ? `Best Combo: x${bestCombo}` : "";
    AudioEngine.playGameOver();
    gameOverScreen.classList.remove("hidden");
}

function resetGame() {
    activeSwords.forEach(s => s.element?.remove());
    activeMelons.forEach(m => m.element?.remove());
    activeSwords = [];
    activeMelons = [];

    score = 0; lives = 3; level = 1; isGameOver = false;
    combo = 0; bestCombo = 0;
    clearTimeout(comboResetTimer);

    scoreEl.textContent = "Score: 0";
    livesEl.textContent = "❤️❤️❤️";
    levelEl.textContent = "Lvl 1";
    updateComboDisplay();
    gameOverScreen.classList.add("hidden");

    clearInterval(spawnInterval);
    spawnInterval = setInterval(spawnWatermelon, 1100);
    updateGame();
}

// Start Game
resetGame();
</script>
